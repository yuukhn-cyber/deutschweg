<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschWeg — Full-Stack Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* CSS-ka Guud ee DeutschWeg */
        :root {
            --c-bg: #0a0a0c;
            --c-text: #f3f4f6;
            --c-primary: #ffbd59;
            --c-primary-glow: rgba(255, 189, 89, 0.2);
            --c-card-bg: #141419;
            --c-border: #24242b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--c-bg);
            color: var(--c-text);
            overflow-x: hidden;
        }

        /* Qaybta sare ee mareegta */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }
        .logo span { color: var(--c-primary); }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 75vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .badge {
            background-color: rgba(255, 189, 89, 0.1);
            border: 1px solid rgba(255, 189, 89, 0.3);
            color: var(--c-primary);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin: 0 0 1rem 0;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, var(--c-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: #9ca3af;
            max-width: 600px;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .cta-group {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--c-primary);
            color: var(--c-bg);
            border: none;
            box-shadow: 0 4px 20px var(--c-primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 189, 89, 0.4);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--c-primary);
            border: 2px solid var(--c-primary);
        }

        .btn-secondary:hover {
            background-color: var(--c-primary-glow);
            transform: translateY(-2px);
        }

        /* POP-UP MODAL (Sanduuqa Diiwaangelinta Casriga ah) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background-color: var(--c-card-bg);
            border: 1px solid var(--c-border);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .modal-box h2 {
            margin-top: 0;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .modal-box p {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #9ca3af;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--c-bg);
            border: 1px solid var(--c-border);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--c-primary);
        }

        .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--c-primary);
            color: var(--c-bg);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #e5a94e;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Deutsch<span>Weg</span></div>
        <button class="btn btn-primary" id="navAuthBtn" style="padding: 0.5rem 1.2rem; font-size: 0.9rem;">Start Learning</button>
    </header>

    <section class="hero">
        <div class="badge">🇩🇪 Your German Journey Starts Here</div>
        <h1>Master Deutsch<br>from A0 to C2</h1>
        <p>Structured vocabulary, stories, listening, reading, writing — every level, every skill, one focused path. Insha Allah, you'll get there.</p>
        
        <div class="cta-group">
            <button class="btn btn-primary" id="heroStartBtn">Begin at A0 →</button>
            <button class="btn btn-secondary" id="heroExploreBtn">Explore Categories</button>
        </div>
    </section>

    <div class="modal-overlay" id="authModal">
        <div class="modal-box">
            <button class="close-btn" id="closeAuthBtn">&times;</button>
            <h2>Ku soo dhowaw DeutschWeg</h2>
            <p>Fadlan is dhiwaangeli si aad u kaydsato casharadaada.</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="email">Email-kaaga</label>
                    <input type="email" id="email" placeholder="magac@tusaale.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Kelmada Sirta ah (Password)</label>
                    <input type="password" id="password" placeholder="Ugu yaraan 6 xaraf" required>
                </div>
                <button type="submit" class="submit-btn">Abuur Account</button>
            </form>
        </div>
    </div>

    <script>
        // 1. ISKU XIRKA SUPABASE BACKEND (Xogta rasmiga ah oo saxda ah)
        const SUPABASE_URL = 'https://vltzfyqxhgbnlvqkjuun.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_srk2wvFFAjH4uZaGbBjUNw_bZ-Kekkm'; 
                                   sb_publishable_srk2wvFFAjH4uZaGbBjUNw_bZ-Kekkm
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. LOGIC-KA MODAL-KA (Pop-up Controls)
        const authModal = document.getElementById('authModal');
        const navAuthBtn = document.getElementById('navAuthBtn');
        const heroStartBtn = document.getElementById('heroStartBtn');
        const heroExploreBtn = document.getElementById('heroExploreBtn');
        const closeAuthBtn = document.getElementById('closeAuthBtn');

        function openModal() { authModal.classList.add('active'); }
        function closeModal() { authModal.classList.remove('active'); }

        // Badhamada oo dhan marka la riixo Modal-ka ayaa furmaya
        navAuthBtn.addEventListener('click', openModal);
        heroStartBtn.addEventListener('click', openModal);
        heroExploreBtn.addEventListener('click', openModal);
        closeAuthBtn.addEventListener('click', closeModal);

        window.addEventListener('click', (e) => {
            if (e.target === authModal) closeModal();
        });

        // 3. EVENT-KA REIGSTER-KA (Diiwaangelinta dhabta ah)
        const registerForm = document.getElementById('registerForm');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.querySelector('.submit-btn');

            submitBtn.innerText = "Gelinaya xogta...";
            submitBtn.disabled = true;

            // La hadalka Supabase Authentication
            const { data, error } = await _supabase.auth.signUp({
                email: email,
                password: password,
            });

            submitBtn.innerText = "Abuur Account";
            submitBtn.disabled = false;

            if (error) {
                alert("Cillad: " + error.message);
            } else {
                alert("Waa guul! Email xaqiijin ah ayaa kuu soo dhacay, fadlan eeg sanduuqa fariimahaaga.");
                closeModal();
                registerForm.reset();
            }
        });
    </script>
</body>
</html>
